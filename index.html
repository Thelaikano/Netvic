<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Rubik+Mono+One&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu"
    />
    <link rel="stylesheet" href="estilos-inicio.css" />
    <title>Netvic - Inicio</title>
  </head>
  <body>
    <header id="menu">
      <div>
        <h1 id="h1">Netvic.com</h1>
        <span class="separacion">
          <p>Recien Agregado</p>
        </span>
      </div>
      <nav>
        <a href="Netvic/index.html">Inicio</a>
        <a href="Netvic/peliculas/peliculas.html">Peliculas</a>
        <a href="">Series</a>
        <ul>
          <span>Libros</span>
          <div class="mini-menu">
            <li><a href="">Libros</a></li>
            <li><a href="">Comics</a></li>
            <li><a href="">Mangas</a></li>
          </div>
        </ul>
        <a href="">Programas</a>
        <a href="">Juegos</a>
        <span class="changefondo-on">ON</span>
        <div class="changefondo">
          <button class="btn-changefondo"></button>
        </div>
        <span class="changefondo-off">OFF</span>
      </nav>

      <div id="mini-menu">
        <div class="icono">
          <span class="material-symbols-outlined"> menu </span>
        </div>
        <span class="filtro-minimenu">
          <p>Inicio</p>
        </span>
        <span class="menu-minimenu">
          <a href="Netvic/index.html">Inicio</a>
          <a href="Netvic/peliculas/peliculas.html">Peliculas</a>
          <a href="">Series</a>
          <a href="">Libros</a>
          <a href="">Programas</a>
          <a href="">Juegos</a>
          <div class="changefondo">
            <button class="btn-changefondo"></button>
          </div>
        </span>
      </div>
    </header>

    <main id="main">
      <section class="contenedor">
        <p><a href="Netvic/peliculas/peliculas.html">Peliculas</a></p>
        <article id="galeria-peliculas"></article>
      </section>
      <section class="contenedor">
        <p><a href="">Series</a></p>
        <article id="galeria-series"></article>
      </section>
      <section class="contenedor">
        <p><a href="">Libros</a></p>
        <article id="galeria-libros"></article>
      </section>
      <section class="contenedor">
        <p><a href="">Programas</a></p>
        <article id="galeria-programas"></article>
      </section>
      <section class="contenedor">
        <p><a href="">Juegos</a></p>
        <article id="galeria-juegos"></article>
      </section>
      <div id="objeto" class="objeto">
        <iframe id="iframe" scrolling="NO" allowfullscreen="true"></iframe>
        <button id="cerrar" title="Cerrar">X</button>
        <div id="resumen"></div>
      </div>
    </main>
    <section id="login">
      <div id="login-separacion">
        <p id="login-titulo">Netvic.com</p>
        <input
          id="login-input"
          type="password"
          placeholder="Contraseña"
          autocomplete="off"
        />
        <button id="login-button">Ingresar</button>
      </div>
    </section>
    <script src="codigo-inicio.js"></script>
  </body>
</html>
